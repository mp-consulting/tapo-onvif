name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # Stdlib-only project at runtime; tests need pyyaml + pytest.
        # `pytapo` is intentionally NOT installed — it only matters for
        # tapo_to_rtsp.py, which talks to real hardware and isn't unit-tested.
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest

      - name: Run tests
        run: pytest -v
