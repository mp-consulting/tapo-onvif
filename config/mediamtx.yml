logLevel: info
# 8555 instead of default 8554 because qemu/Android-emulator squats on
# 127.0.0.1:8554 if you ever ran one.
rtspAddress: :8555
rtmpAddress: :1936
hlsAddress: :8889
webrtcAddress: :8890
srtAddress: :8891

# Anyone (loopback or LAN) needs these creds to publish or read.
# Match these to PUBLISH_USER / PUBLISH_PASS in .env so the bridge can
# authenticate when it pushes RTSP, and so external readers (UniFi etc.)
# need credentials to view.
authMethod: internal
authInternalUsers:
  - user: publish
    pass: publish
    permissions:
      - action: publish
      - action: read
  # Add a separate read-only user if you want to expose RTSP without giving
  # write access. UniFi gets this in the embedded RTSP URL from ONVIF.
  - user: any
    pass: any
    ips: [all]
    permissions:
      - action: read

paths:
  all_others: {}
